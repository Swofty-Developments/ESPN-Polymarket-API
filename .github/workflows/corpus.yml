name: corpus

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: corpus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  data:
    name: data (validate + sync freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-data.mjs
      - name: embedded data is in sync with data/
        run: node scripts/sync-data.mjs --check

  rust:
    name: rust reference + corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-rs
      - working-directory: core-rs
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features

  python:
    name: python binding + corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - working-directory: bindings/python
        run: uv run --with pytest pytest -q

  js:
    name: js binding + corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: bindings/js
        run: |
          npm install
          npm test
